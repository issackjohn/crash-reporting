<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="text/javascript" src=".\script.js"></script>
  </head>
  <body>
    <!-- Add some random elements -->
    <div>Some text</div>
    <button id="hangBtn">Hang Browser</button>
    <button id="reportBtn">Display reports</button>
    <!-- Add a button that increments a counter -->
    <button id="counterBtn">Increment Counter</button>
    <div class="counter">0</div>
    <div class="output"></div>

    <!-- Iframe to embed hang.html -->
    <iframe src="hang.html" width="800px" height="600px"></iframe>
    <!-- Iframe for bing.com -->
    <!-- https://cdn.jsdelivr.net/gh/user/repo@version/file -->
    <!-- <script src="https://cdn.jsdelivr.net/gh/issackjohn/issackjohn.github.io/my-script.js"></script> -->

    <script>
      // Get reference to button
      const reportBtn = document.querySelector("#reportBtn");

      // Get reference to counter button
      const counterBtn = document.querySelector("#counterBtn");

      // Function to increment counter on the html page
      function incrementCounter() {
        const counterElem = document.querySelector(".counter");
        counterElem.textContent = parseInt(counterElem.textContent) + 1;
      }

      // bind function to onclick method
      counterBtn.onclick = (event) => incrementCounter();

      // Set up function to display reports
      function displayReports(reports) {
        const outputElem = document.querySelector(".output");
        // Clear any existing reportss
        outputElem.innerHTML = "";
        const list = document.createElement("ul");
        outputElem.appendChild(list);

        for (let i = 0; i < reports.length; i++) {
          let listItem = document.createElement("li");
          let textNode = document.createTextNode(
            "Report " + (i + 1) + ", type: " + reports[i].type
          );
          listItem.appendChild(textNode);
          let innerList = document.createElement("ul");
          listItem.appendChild(innerList);
          list.appendChild(listItem);

          for (let key in reports[i].body) {
            let innerListItem = document.createElement("li");
            let keyValue = reports[i].body[key];
            innerListItem.textContent = key + ": " + keyValue;
            innerList.appendChild(innerListItem);
          }
        }
      }

      const observer = new ReportingObserver(
        (reports, observer) => {
          reportBtn.onclick = (event) => displayReports(reports);
        },
        { buffered: true }
      );

      observer.observe();

      // create a function that causes the browser to hang for 5 seconds
      function hang() {
        hang2();
      }
      function hang2() {
        hang3();
      }
      function hang3() {
        while (true) {}
      }

      const hangBtn = document.querySelector("#hangBtn");
      hangBtn.onclick = (event) => hang();

      const profiler = new Profiler({
        sampleInterval: 10, // Target sampling every 10ms
        maxBufferSize: 10 * 100, // Cap at ~10s worth of samples
      });

      async function collectAndSendTrace() {
        if (profiler.stopped) return;

        const trace = await profiler.stop();
        const traceJson = JSON.stringify({
          timing: performance.timing,
          trace,
        });

        // Send the trace JSON to a server via Fetch/XHR
        console.log(trace);
        console.log(traceJson);
      }

      profiler.addEventListener("samplebufferfull", collectAndSendTrace);
      window.addEventListener("load", collectAndSendTrace);

      // Rest of the page's JS initialization logic
    </script>
  </body>
</html>
